// --- SidebarFilters ---

                        <div className="flex items-center gap-2">
                            <input type="checkbox" checked={filters.types.includes(item.name)} onChange={() => onFilterChange('types', item.name)} className="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary accent-primary"/>

// --- SearchBar ---
function SearchBar({ searchTerm, onSearch }) {
    return (
        <div className="mb-4">
            <div className="flex gap-3">
                <div className="flex-1 relative">
                    <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" value={searchTerm} onChange={e => onSearch(e.target.value)} placeholder="输入关键词搜索数据集，如：liver cancer, single-cell RNA-seq..." className="w-full h-[56px] pl-12 pr-4 bg-white border border-gray-200 rounded-[14px] text-sm text-gray-900 placeholder:text-gray-400 glow-input focus:outline-none focus:border-primary transition-all"/>
                </div>
                <button className="h-[56px] px-6 btn-gradient text-white rounded-[14px] text-sm font-medium flex items-center gap-2 hover:opacity-90 transition-all shadow-md">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>

            {/* Example Tags */}

                <span className="text-xs text-gray-400">试试：</span>
                {['GSE100026','RNA-seq','Homo sapiens','liver cancer'].map(tag => (
                    <button key={tag} onClick={() => onSearch(tag)} className="px-3 py-1 text-xs bg-gray-100 text-gray-600 rounded-full hover:bg-primary-bg hover:text-primary transition-all">{tag}</button>
                ))}
            </div>
        </div>

}

// --- ActiveFilters ---
function ActiveFilters({ filters, onRemove, onClear }) {
    const tags = [...filters.types, 'Homo sapiens', 'Transcriptomics', 'Cancer'];
    return (
        <div className="flex items-center gap-2 mb-4 flex-wrap">
            <span className="text-xs text-gray-500 font-medium">已选条件：</span>
            {tags.map(tag => (
                <span key={tag} className="inline-flex items-center gap-1 px-2.5 py-1 text-xs bg-primary-bg text-primary rounded-full font-medium">
                    {tag}
                    <button onClick={() => onRemove(tag)} className="w-3.5 h-3.5 flex items-center justify-center rounded-full hover:bg-primary/20 transition-all">
                        <svg className="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </span>
            ))}
            <button onClick={onClear} className="text-xs text-gray-400 hover:text-red-500 transition-colors ml-1">清空全部</button>
        </div>
    );
}

// --- DatasetCard ---
function DatasetCard({ dataset, onAddToWorkspace }) {
    const typeColors = {
        'TRANSCRIPTOMICS (BULK)': 'bg-blue-50 text-blue-600 border-blue-200',
        'TRANSCRIPTOMICS (SC)': 'bg-purple-50 text-purple-600 border-purple-200',
        'EPIGENOMICS': 'bg-amber-50 text-amber-600 border-amber-200',
        'PROTEOMICS': 'bg-emerald-50 text-emerald-600 border-emerald-200',
    };
    return (
        <div className="bg-white rounded-[18px] border border-border-light p-5 card-hover cursor-pointer">
            <div className="flex items-start justify-between mb-3">
                <span className="text-sm font-bold text-primary">{dataset.id}</span>
                <span className={`text-[10px] px-2 py-0.5 rounded-full border font-medium ${typeColors[dataset.datatype] || 'bg-gray-50 text-gray-600 border-gray-200'}`}>{dataset.datatype}</span>
            </div>
            <h3 className="text-[15px] font-medium text-gray-900 leading-snug mb-3 line-clamp-2" style={{display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{dataset.title}</h3>
            <div className="space-y-1.5 mb-4">
                <div className="flex items-center text-xs"><span className="text-gray-400 w-14">物种</span><span className="text-gray-700 italic">{dataset.organism}</span></div>
                <div className="flex items-center text-xs"><span className="text-gray-400 w-14">样本量</span><span className="text-gray-700 font-medium">{dataset.sampleCount}</span></div>
                <div className="flex items-center text-xs"><span className="text-gray-400 w-14">平台</span><span className="text-gray-700">{dataset.platform}</span></div>
            </div>
            <div className="flex items-center justify-between pt-3 border-t border-gray-100">
                <button onClick={() => onAddToWorkspace(dataset.id)} className="text-xs px-3 py-1.5 border border-primary text-primary rounded-lg hover:bg-primary-bg transition-all font-medium">+ 添加到工作台</button>
                <button className="text-xs text-gray-500 hover:text-primary transition-colors font-medium">查看详情 →</button>
            </div>
        </div>
    );
}

                </div>
                <div className="flex gap-2">
                    <input type="text" value={aiInput} onChange={e => setAiInput(e.target.value)} placeholder="输入你的问题..." className="flex-1 h-9 px-3 text-xs border border-gray-200 rounded-lg glow-input focus:outline-none focus:border-primary transition-all"/>
                    <button className="h-9 w-9 btn-gradient rounded-lg flex items-center justify-center text-white hover:opacity-90 transition-all">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
            </div>
            {/* Recommendations */}
            <div className="bg-white rounded-2xl p-5 border border-border-light">
                <h3 className="text-sm font-semibold text-gray-900 mb-3">你可能想找</h3>
                <div className="space-y-1">
                    {recommendedDatasets.map(d => (
                        <div key={d.id} className="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-primary-bg cursor-pointer transition-all group">
                            <span className="text-xs font-bold text-primary">{d.id}</span>
                            <span className="text-xs text-gray-500 group-hover:text-primary transition-colors">{d.desc}</span>
                        </div>
                    ))}
                </div>
            </div>
            {/* Recent History */}
            <div className="bg-white rounded-2xl p-5 border border-border-light">
                <h3 className="text-sm font-semibold text-gray-900 mb-3">最近常用</h3>
                <div className="space-y-1">
                    {recentHistory.map(h => (
                        <div key={h.id} className="flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-gray-50 cursor-pointer transition-all">
                            <div className="flex items-center gap-2">
                                <svg className="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                <div>
                                    <span className="text-xs font-medium text-gray-700">{h.id}</span>
                                    <span className="text-xs text-gray-400 ml-2">{h.title}</span>
                                </div>
                            </div>
                            <span className="text-[10px] text-gray-400">{h.time}</span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );

    return (
        <>
            {/* Desktop */}
            <aside className="hidden xl:block w-[340px] flex-shrink-0 sticky top-[88px] h-[calc(100vh-104px)] overflow-y-auto sidebar-scroll">
                {panelContent}
            </aside>
            {/* Medium screens - narrower */}
            <aside className="hidden lg:block xl:hidden w-[280px] flex-shrink-0 sticky top-[88px] h-[calc(100vh-104px)] overflow-y-auto sidebar-scroll">
                {panelContent}
            </aside>
            {/* Mobile toggle button */}
            <button onClick={onToggle} className="lg:hidden fixed bottom-6 right-6 w-12 h-12 btn-gradient rounded-full shadow-lg flex items-center justify-center text-white z-50 ai-pulse">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            </button>
            {/* Mobile panel */}
            {aiOpen && (
                <div className="lg:hidden fixed inset-0 z-[60] flex justify-end">
                    <div className="absolute inset-0 bg-black/30" onClick={onToggle}></div>
                    <div className="relative w-[340px] max-w-[90vw] bg-page-bg h-full overflow-y-auto p-4 shadow-xl fade-in">
                        <button onClick={onToggle} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 z-10">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                        <div className="pt-8">{panelContent}</div>
                    </div>
                </div>
            )}
        </>
    );
}

// ============ MAIN APP ============
function App() {
    const [searchTerm, setSearchTerm] = React.useState('');
    const [loading, setLoading] = React.useState(true);
    const [viewMode, setViewMode] = React.useState('grid');
    const [sortBy, setSortBy] = React.useState('相关性');
    const [filters, setFilters] = React.useState({ types: ['GEO'] });
    const [mobileFilterOpen, setMobileFilterOpen] = React.useState(false);
    const [aiOpen, setAiOpen] = React.useState(false);
    const [addedIds, setAddedIds] = React.useState([]);

    React.useEffect(() => { setTimeout(() => setLoading(false), 1500); }, []);

    const handleFilterChange = (key, value) => {
        setFilters(prev => {
            const arr = prev[key] || [];
            return { ...prev, [key]: arr.includes(value) ? arr.filter(v => v !== value) : [...arr, value] };
        });
    };

    const filtered = mockDatasets.filter(d =>
        d.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
        d.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
        d.disease.toLowerCase().includes(searchTerm.toLowerCase()) ||
        d.organism.toLowerCase().includes(searchTerm.toLowerCase())
    );

    const handleAdd = (id) => {
        if (!addedIds.includes(id)) setAddedIds([...addedIds, id]);
    };

    return (
        <div className="min-h-screen bg-page-bg">
            <Header />
            <div className="pt-[72px] flex gap-4 p-4 max-w-[1800px] mx-auto">
                {/* Left Sidebar */}
                <SidebarFilters filters={filters} onFilterChange={handleFilterChange} mobileOpen={mobileFilterOpen} onMobileClose={() => setMobileFilterOpen(false)} />

                {/* Main Content */}
                <main className="flex-1 min-w-0">
                    {/* Mobile filter button */}
                    <button onClick={() => setMobileFilterOpen(true)} className="lg:hidden mb-4 h-10 px-4 bg-white border border-gray-200 rounded-xl text-sm text-gray-600 flex items-center gap-2 hover:bg-gray-50 transition-all">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                        筛选
                    </button>

                    <SearchBar searchTerm={searchTerm} onSearch={setSearchTerm} />
                    <ActiveFilters filters={filters} onRemove={() => {}} onClear={() => setFilters({types:[]})} />

                    {/* Stats Bar */}
                    <div className="flex items-center justify-between mb-4">
                        <span className="text-sm text-gray-500">显示 <span className="font-semibold text-gray-900">{filtered.length}</span> / <span className="text-gray-400">15,544</span> 个数据集</span>
                        <div className="flex items-center gap-3">
                            <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="h-8 px-3 text-xs border border-gray-200 rounded-lg bg-white text-gray-600 focus:outline-none focus:border-primary">
                                <option>相关性</option><option>样本量</option><option>最新发布</option>
                            </select>
                            <div className="flex border border-gray-200 rounded-lg overflow-hidden">
                                <button onClick={() => setViewMode('grid')} className={`h-8 px-2.5 transition-all ${viewMode==='grid'?'bg-primary-bg text-primary':'bg-white text-gray-400 hover:bg-gray-50'}`}>
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                                </button>
                                <button onClick={() => setViewMode('list')} className={`h-8 px-2.5 border-l border-gray-200 transition-all ${viewMode==='list'?'bg-primary-bg text-primary':'bg-white text-gray-400 hover:bg-gray-50'}`}>
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Dataset Grid */}
                    {loading ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                            {Array.from({length:9}).map((_,i) => <SkeletonCard key={i} />)}
                        </div>
                    ) : viewMode === 'grid' ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 fade-in">
                            {filtered.map(d => <DatasetCard key={d.id} dataset={d} onAddToWorkspace={handleAdd} />)}
                        </div>
                    ) : (
                        <div className="space-y-3 fade-in">
                            {filtered.map(d => (
                                <div key={d.id} className="bg-white rounded-xl border border-border-light p-4 flex items-center gap-4 card-hover cursor-pointer">
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="text-sm font-bold text-primary">{d.id}</span>
                                            <span className="text-[10px] px-2 py-0.5 rounded-full border border-blue-200 bg-blue-50 text-blue-600 font-medium">{d.datatype}</span>
                                        </div>
                                        <p className="text-sm text-gray-800 font-medium truncate">{d.title}</p>
                                        <div className="flex items-center gap-4 mt-1 text-xs text-gray-500">
                                            <span>{d.organism}</span><span>样本: {d.sampleCount}</span><span>{d.platform}</span>
                                        </div>
                                    </div>
                                    <button onClick={() => handleAdd(d.id)} className={`text-xs px-3 py-1.5 rounded-lg font-medium transition-all ${addedIds.includes(d.id) ? 'bg-green-50 text-green-600 border border-green-200' : 'border border-primary text-primary hover:bg-primary-bg'}`}>
                                        {addedIds.includes(d.id) ? '✓ 已添加' : '+ 添加'}
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Pagination hint */}
                    {!loading && (
                        <div className="flex justify-center mt-8">
                            <button className="h-10 px-6 text-sm text-gray-500 border border-gray-200 rounded-xl hover:bg-gray-50 transition-all">加载更多数据集...</button>
                        </div>
                    )}
                </main>

                {/* Right AI Panel */}
                <AIAssistantPanel aiOpen={aiOpen} onToggle={() => setAiOpen(!aiOpen)} />
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
